version: '3.8'

services:
  # Microservice 1: MongoDB Database (Isolated internally)
  database:
    image: mongo:latest
    container_name: shielddb-mongo
    # Secure Design: No ports exposed to the host machine.
    # The database is only accessible inside the isolated bridge network by the backend.
    volumes:
      - mongo-data:/data/db
    networks:
      - shield-network

  # Microservice 2: ShieldDB Python Backend Security Gateway
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shielddb-backend
    # Exposed internally, and port 8000 mapped for local direct MCP sessions if needed
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://database:27017/shield_db
    depends_on:
      - database
    networks:
      - shield-network

  # Microservice 3: Nginx API Gateway & React Web Dashboard (Single Entry Point)
  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.frontend
    container_name: shielddb-frontend
    # Exposes Nginx API Gateway on port 80 (standard HTTP).
    # Visitors go to http://localhost and Nginx proxies /api to backend internally!
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shield-network

networks:
  shield-network:
    driver: bridge

volumes:
  mongo-data:
